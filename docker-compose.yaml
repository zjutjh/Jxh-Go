services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: unless-stopped
    environment:
      NAPCAT_UID: ${NAPCAT_UID:-1000}
      NAPCAT_GID: ${NAPCAT_GID:-1000}
    ports:
      - "3000:3000"
      - "3001:3001"
      - "6099:6099"
    volumes:
      - napcat_qq:/app/.config/QQ
      - napcat_config:/app/napcat/config
      - napcat_plugins:/app/napcat/plugins

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: jxh_bot
      MYSQL_USER: jxh
      MYSQL_PASSWORD: ${JXH_MYSQL_PASSWORD:-jxh_password}
      MYSQL_ROOT_PASSWORD: ${JXH_MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10

  quote:
    image: phlin996/qq-quote-go:latest
    container_name: qq-quote-go
    profiles: ["quote"]
    ports:
      - "5000:5000"

volumes:
  napcat_qq:
  napcat_config:
  napcat_plugins:
  mysql_data:
